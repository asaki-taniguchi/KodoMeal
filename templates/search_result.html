<!DOCTYPE html>
    <html lang='ja'>
    <head>
        <meta charset="UTF-8">
        <title>検索結果</title>
    </head>
    <body>
        <h1>検索結果画面</h1>

        {% if stores %}
            <ul>
                {% for store in stores %}  {# 条件入力 #}
                    <li>{{ store.name }}({{ store.menu }})</li>
                {% endfor %}
            </ul>
        {% else %}  {#　条件一致なし #}
            <p>該当する店舗が見つかりませんでした</p>
            <p>条件を変えて再検索してください</p>
        {% endif %}
        <a href="{% url 'app_top' %}">◀︎戻る</a>
    </body>
    </html>
