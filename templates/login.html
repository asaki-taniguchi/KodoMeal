<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
</head>
<body>

    <h1 class="login-title">ログイン</h1>

    <form method="post" class="login-form">
        {% csrf_token %}
        
        <label>メールアドレス</label><br>
        {{ form.username }}<br>

        <label>パスワード</label><br>
        {{ form.password }}<br>

        <button type="submit" class="login-button">ログイン</button>
    </form>

    <div class="link-area">
        <p class="register-text">
            アカウントをお持ちでない方は
            <a href="#" class="register-link">こちら</a>
        </p>

        <p class="reset-text">
            パスワードを忘れた方は<a href="#" class="reset-link">こちら</a>
        </p>

        <a href="/" class="back-link">
            ← トップ画面に戻る
        </a>
    </div>

</body>
</html>
