<!DOCTYPE html>
 <html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投稿する</title>

    <style>
    .photo-row {
        display: flex;
        gap: 10px;
        margin-top: 10px;
    }

    .photo-box {
        width: 100px;
        height: 100px;
        border: 1px solid #ccc;
        border-radius: 8px;
        background-color: #f9f9f9;
    }

    .photo-add {
        width: 100px;
        height: 100px;
        border: 1px dashed #aaa;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        color: #666;
        background-color: #f9f9f9;
    }

    .photo-note {
        font-size: 12px;
        color: #777;
        margin-top: 5px;
    }
    </style>
</head>
<body>

    {% if store %}
        <a href="{% url 'store_detail' store.id %}">◀︎戻る</a>

        <h1>投稿する</h1>
        <p>※は必須項目です</p>

        <form method="post">
            {% csrf_token %}

            <div class="photo-section">
                <div class="photo-row">
                    <div class="photo-box"></div>
                    <div class="photo-box"></div>
                    <div class="photo-add">＋</div>
                </div>

                <p class="photo-note">※最大4枚まで投稿可能（1枚必須）</p>
            </div>

            <div class="kids-menu-section">
                <h2>食べたキッズメニュー① ※</h2>

                <label for="menu_name">メニュー名</label><br>
                <input type="text" id="menu_name" name="menu_name" placeholder="メニュー名を入力"><br><br>

                <label for="target_age">対象年齢</label><br>
                <select id="target_age" name="target_age">
                    <option value="">年齢を選択する</option>
                    <option value="乳児">乳児</option>
                    <option value="未就学児">未就学児</option>
                    <option value="小学生">小学生</option>
                </select><br><br>

                <div class="quantity-section">
                    <h3>量 ※</h3>

                    <label>
                        <input type="radio" name="quantity" value="1"> 1
                    </label>
                    <label>
                        <input type="radio" name="quantity" value="2"> 2
                    </label>
                    <label>
                        <input type="radio" name="quantity" value="3"> 3
                    </label>
                    <label>
                        <input type="radio" name="quantity" value="4"> 4
                    </label>
                    <label>
                        <input type="radio" name="quantity" value="5"> 5
                    </label>

                    <p>1：少ない 〜 5：多い</p>
                </div>

                <div class="add-menu-section">
                    <p>＋メニューを追加</p>
                </div>

                <div class="facility-section">
                    <h2>店舗設備情報</h2>
                    <p>当てはまるものをタップ</p>

                    <label><input type="checkbox" name="facility" value="stroller">ベビーカーOK</label><br>
                    <label><input type="checkbox" name="facility" value="kids_chair">キッズチェア</label><br>
                    <label><input type="checkbox" name="facility" value="tatami">座敷</label><br>
                    <label><input type="checkbox" name="facility" value="private_room">個室</label><br>
                    <label><input type="checkbox" name="facility" value="table">テーブル</label><br>
                    <label><input type="checkbox" name="facility" value="diaper">おむつ交換台</label><br>
                    <label><input type="checkbox" name="facility" value="kids_space">キッズスペース</label><br>
                    <label><input type="checkbox" name="facility" value="kids_cutlery">キッズカトラリー</label><br>
                </div>

                <div class="rating-section">
                    <h2>総合評価</h2>
                    <p>1:低い 2:やや低い 3:普通 4:高い 5:とても高い</p>
                    <select name="rating">
                        <option value="">選択してください</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>
                </div>

                <div class="comment-section">
                    <h2>コメント</h2>
                    <textarea name="content" rows="5" cols="30" placeholder="一言でもOKです"></textarea>
                </div>

                <div class="button-section">
                    <button type="submit" name="save_type" value="draft">下書き保存</button>
                    <button type="submit" name="save_type" value="publish">投稿</button>
                </div>
            </form>

        {% else %}
            <p>店舗情報が見つかりませんでした</p>
        {% endif %}

</body>
</html>
