<!DOCTYPE html>
    <html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>店舗詳細</title>
    </head>
    <body>

        <a href="{% url 'app_top' %}">◀︎戻る</a>

        {% if store %}
            <h1>{{ store.name }}</h1>

            <div class="store-info">
                <p>📍 {{ store.address }}</p>
                <p>📞 {{ store.phone }}</p>
                <p>🕑 営業時間：{{ store.hours }}</p>
                <p>📅 定休日：{{ store.holiday }}</p>
                <p>🚗 駐車場：{{ store.parking }}</p>
            </div>

            <p>キッズメニュー：{{ store.menu }}</p>
        {% endif %}
    
    </body>
    </html>
